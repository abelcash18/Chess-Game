<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Multiplayer - Online & Offline</title>
    <link rel="stylesheet" href="chess.css">
</head>
<body>
    <div class="game-container">
        <h1>♔ Chess Multiplayer ♚</h1>
        
        <!-- Mode Selection -->
        <div id="mode-selection" class="mode-selection">
            <h2>Select Game Mode</h2>
            <div class="mode-buttons">
                <button id="offline-btn" class="mode-btn">♟ Offline (2 Players)</button>
                <button id="online-btn" class="mode-btn">🌐 Online Multiplayer</button>
            </div>
        </div>

        <!-- Online Connection -->
        <div id="online-setup" class="online-setup hidden">
            <h2>Online Multiplayer</h2>
            <div class="connection-options">
                <div class="create-room">
                    <h3>Create Room</h3>
                    <input type="text" id="room-name" placeholder="Enter room name">
                    <input type="text" id="player-name" placeholder="Your name">
                    <button id="create-room-btn" class="action-btn">Create Room</button>
                </div>
                <div class="join-room">
                    <h3>Join Room</h3>
                    <input type="text" id="join-room-name" placeholder="Room name">
                    <input type="text" id="join-player-name" placeholder="Your name">
                    <button id="join-room-btn" class="action-btn">Join Room</button>
                </div>
            </div>
            <div id="connection-status" class="connection-status"></div>
            <button id="back-to-mode" class="back-btn">← Back to Mode Selection</button>
        </div>

        <!-- Game Room -->
        <div id="game-room" class="game-room hidden">
            <div class="room-info">
                <span id="room-name-display"></span>
                <span id="player-color"></span>
            </div>
            <div class="game-info">
                <div id="turn-indicator" class="turn-indicator">White's Turn</div>
                <div id="game-status" class="game-status"></div>
            </div>
            <div class="board-container">
                <div id="chess-board" class="chess-board"></div>
            </div>
            <div class="captured-pieces">
                <div class="captured white-captured">
                    <span class="captured-label">White Captured:</span>
                    <div id="white-captured"></div>
                </div>
                <div class="captured black-captured">
                    <span class="captured-label">Black Captured:</span>
                    <div id="black-captured"></div>
                </div>
            </div>
            <div class="game-controls">
                <button id="resign-btn" class="control-btn">Resign</button>
                <button id="draw-btn" class="control-btn">Offer Draw</button>
                <button id="new-game-btn" class="control-btn">New Game</button>
            </div>
            <div id="game-message" class="game-message"></div>
            <button id="leave-room-btn" class="back-btn">Leave Room</button>
        </div>

        <!-- Offline Game -->
        <div id="offline-game" class="offline-game hidden">
            <div class="game-info">
                <div id="offline-turn-indicator" class="turn-indicator">White's Turn</div>
                <div id="offline-game-status" class="game-status"></div>
            </div>
            <div class="board-container">
                <div id="offline-chess-board" class="chess-board"></div>
            </div>
            <div class="captured-pieces">
                <div class="captured white-captured">
                    <span class="captured-label">White Captured:</span>
                    <div id="offline-white-captured"></div>
                </div>
                <div class="captured black-captured">
                    <span class="captured-label">Black Captured:</span>
                    <div id="offline-black-captured"></div>
                </div>
            </div>
            <div class="game-controls">
                <button id="offline-resign-btn" class="control-btn">Resign</button>
                <button id="offline-draw-btn" class="control-btn">Offer Draw</button>
                <button id="offline-new-game-btn" class="control-btn">New Game</button>
                <button id="undo-btn" class="control-btn">Undo Move</button>
            </div>
            <div id="offline-game-message" class="game-message"></div>
            <button id="offline-back-btn" class="back-btn">← Back to Mode Selection</button>
        </div>

        <!-- Move History -->
        <div id="move-history" class="move-history hidden">
            <h3>Move History</h3>
            <div id="moves-list"></div>
        </div>
    </div>

    <!-- Promotion Modal -->
    <div id="promotion-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Choose Promotion Piece</h3>
            <div class="promotion-choices">
                <button class="promotion-btn" data-piece="Q">♕</button>
                <button class="promotion-btn" data-piece="R">♖</button>
                <button class="promotion-btn" data-piece="B">♗</button>
                <button class="promotion-btn" data-piece="N">♘</button>
            </div>
        </div>
    </div>

    <!-- Game Over Modal -->
    <div id="game-over-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="game-over-title">Game Over</h2>
            <p id="game-over-message"></p>
            <button id="game-over-new-game" class="action-btn">New Game</button>
            <button id="game-over-close" class="back-btn">Close</button>
        </div>
    </div>

    <script src="chess.js"></script>
</body>
</html>
